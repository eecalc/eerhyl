<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EE Rhyl Target Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #009aa6; 
            color: #333;
            margin: 0;
            padding: 20px 10px; 
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 50, 50, 0.3); 
            border-top: 8px solid #005c63; 
        }
        
        /* CODE-ONLY LOGO STYLING */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .code-logo {
            background-color: #009aa6; 
            width: 85px; 
            height: 85px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto; 
            color: #fff000; 
            font-weight: 900; 
            font-size: 38px; 
            font-family: 'Arial Black', 'Impact', sans-serif; 
            letter-spacing: -1px; 
            box-shadow: 0 4px 10px rgba(0, 154, 166, 0.3);
            border: 3px solid #fff000;
        }

        h1 {
            color: #005c63; 
            text-align: center;
            margin-bottom: 5px;
            font-size: 1.8em;
        }
        p.subtitle { 
            margin-top: 0; 
            color: #555; 
            font-size: 1em; 
            text-align: center;
            margin-bottom: 30px;
        }
        h2 {
            color: #009aa6; 
            margin-bottom: 10px;
            margin-top: 30px;
            border-bottom: 2px solid #b2e0e3;
            padding-bottom: 5px;
            font-size: 1.3em;
        }
        
        /* TABLE STYLING */
        .table-responsive {
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            min-width: 500px; 
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background-color: #009aa6; 
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }
        
        tbody tr:nth-child(even) {
            background-color: #f2fafa; 
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            border: 2px solid #b2e0e3; 
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #009aa6; 
        }
        .highlight { font-weight: 600; color: #005c63; }
        
        /* RESULTS BOXES */
        .results-container {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            margin-top: 20px;
        }
        .result-box {
            flex: 1;
            background: #e6f5f6; 
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #009aa6; 
            box-shadow: 0 4px 10px rgba(0, 154, 166, 0.1);
        }
        .result-title {
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: #005c63;
            font-weight: 700;
        }
        .result-value {
            font-size: 3em;
            font-weight: bold;
            transition: color 0.4s ease; 
        }

        /* MOBILE RESPONSIVE RULES */
        @media (max-width: 600px) {
            .container {
                padding: 20px 15px;
            }
            .results-container {
                flex-direction: column; 
                gap: 15px;
            }
            .result-value {
                font-size: 2.5em; 
            }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="logo-container">
        <div class="code-logo">EE</div>
    </div>

    <h1>EE Rhyl Target Calculator</h1>
    <p class="subtitle">Update your Targets, Achieved, or What-If scenarios below to track your performance.</p>

    <div class="results-container">
        <div class="result-box">
            <div class="result-title">Current Overall %</div>
            <div class="result-value" id="currentOverall">0.00%</div>
        </div>
        <div class="result-box">
            <div class="result-title">Projected % (If Achieved)</div>
            <div class="result-value" id="projectedOverall">0.00%</div>
        </div>
    </div>

    <h2>1. Current Performance</h2>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>KPIs</th>
                    <th>Target</th>
                    <th>Achieved</th>
                    <th>KPI Performance</th>
                    <th>Value Per Sale</th>
                </tr>
            </thead>
            <tbody id="currentTableBody">
                </tbody>
        </table>
    </div>

    <h2>2. What if I sold...?</h2>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>KPIs</th>
                    <th>Additional Sales</th>
                </tr>
            </thead>
            <tbody id="whatIfTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 1. Create the default blank slate
    const defaultCategories = [
        { name: "NEW HANDSETS", target: 0, achieved: 0, whatIf: 0 },
        { name: "UPGRADES", target: 0, achieved: 0, whatIf: 0 },
        { name: "NEW PAYM/SIM", target: 0, achieved: 0, whatIf: 0 },
        { name: "NEW HBB", target: 0, achieved: 0, whatIf: 0 },
        { name: "REG HBB", target: 0, achieved: 0, whatIf: 0 },
        { name: "TV", target: 0, achieved: 0, whatIf: 0 }
    ];

    // 2. Try to load saved data from the browser's memory, otherwise use the blank slate
    let categories = JSON.parse(localStorage.getItem('eeRhylTargets')) || defaultCategories;

    function renderTables() {
        const currentBody = document.getElementById('currentTableBody');
        const whatIfBody = document.getElementById('whatIfTableBody');
        
        currentBody.innerHTML = '';
        whatIfBody.innerHTML = '';

        categories.forEach((cat, index) => {
            const kpi = cat.target > 0 ? (cat.achieved / cat.target) : 0;
            const valPerSale = cat.target > 0 ? (1 / cat.target) / 6 : 0;

            const trCurrent = document.createElement('tr');
            trCurrent.innerHTML = `
                <td><strong>${cat.name}</strong></td>
                <td><input type="number" min="0" value="${cat.target}" oninput="updateData(${index}, 'target', this.value)"></td>
                <td><input type="number" min="0" value="${cat.achieved}" oninput="updateData(${index}, 'achieved', this.value)"></td>
                <td class="highlight">${(kpi * 100).toFixed(2)}%</td>
                <td class="highlight">${(valPerSale * 100).toFixed(2)}%</td> `;
            currentBody.appendChild(trCurrent);

            const trWhatIf = document.createElement('tr');
            trWhatIf.innerHTML = `
                <td><strong>${cat.name}</strong></td>
                <td><input type="number" min="0" value="${cat.whatIf}" oninput="updateData(${index}, 'whatIf', this.value)"></td>
            `;
            whatIfBody.appendChild(trWhatIf);
        });

        calculateOverall();
    }

    function updateData(index, field, value) {
        let num = value === '' ? 0 : parseFloat(value);
        if (isNaN(num) || num < 0) num = 0;
        
        categories[index][field] = num;
        
        // 3. Every time a number is updated, save the new data to the browser's memory
        localStorage.setItem('eeRhylTargets', JSON.stringify(categories));
        
        calculateOverall();
        
        const currentRows = document.getElementById('currentTableBody').children;
        const kpi = categories[index].target > 0 ? (categories[index].achieved / categories[index].target) : 0;
        const valPerSale = categories[index].target > 0 ? (1 / categories[index].target) / 6 : 0;
        
        currentRows[index].children[3].innerText = (kpi * 100).toFixed(2) + '%';
        currentRows[index].children[4].innerText = (valPerSale * 100).toFixed(2) + '%'; // CHANGED TO 2 DECIMAL PLACES
    }

    function calculateOverall() {
        let totalKPI = 0;
        let totalWhatIfBump = 0;

        categories.forEach(cat => {
            if(cat.target > 0) {
                const kpi = cat.achieved / cat.target;
                totalKPI += kpi;

                const valPerSale = (1 / cat.target) / 6;
                totalWhatIfBump += (cat.whatIf * valPerSale);
            }
        });

        const currentOverallPercent = (totalKPI / 6) * 100;
        const projectedOverallPercent = currentOverallPercent + (totalWhatIfBump * 100);

        const currentEl = document.getElementById('currentOverall');
        const projectedEl = document.getElementById('projectedOverall');

        currentEl.innerText = currentOverallPercent.toFixed(2) + '%';
        projectedEl.innerText = projectedOverallPercent.toFixed(2) + '%';

        const redColor = '#e74c3c';   
        const greenColor = '#27ae60'; 

        currentEl.style.color = currentOverallPercent < 75 ? redColor : greenColor;
        projectedEl.style.color = projectedOverallPercent < 75 ? redColor : greenColor;
    }

    renderTables();
</script>

</body>
</html>
